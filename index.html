  <body>
    <main class="status-card" role="main" aria-labelledby="status-title">
      <h1 class="eyebrow">Temporary downtime</h1>

      <section class="next-window" aria-live="polite">
        <h2>Expected return on March 27, 2025 - 22:00 UTC</h2>
      </section>
    </main>

  </body>

  <style>
    :root {
  --primary: #ff6b9d;
  --primary-strong: #e85c8b;
  --bg: #0a0612;
  --card: rgba(20, 10, 18, 0.75);
  --muted: #d4b7c7;
  --text: #f8e8f4;
  --accent: #ffa1d8;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: var(--text);
  background: var(--bg);
  display: grid;
  place-items: center;
  padding: 1.5rem;
}

.status-card {
  width: min(680px, 100%);
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 1rem;
  backdrop-filter: blur(8px);
  padding: clamp(1.25rem, 2vw + 1rem, 2rem);
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
}

.eyebrow {
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin: 0;
}

h1 {
  margin: 0.5rem 0 1rem;
  font-size: 1.5rem;
}

h2 {
  margin: 0;
  font-size: 1.12rem;
  color: var(--muted);
  font-weight: 600;
}

.next-window {
  margin-top: 1.2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--accent);
}
  </style>
</html>
