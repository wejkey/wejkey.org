<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Wejkey - Notes</title>
    <meta name="description" content="Website's notes">
    <link rel="canonical" href="https://wejkey.org/notes.html">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Wejkey - Notes">
    <meta property="og:description" content="Website's notes">
    <meta property="og:url" content="https://wejkey.org/notes.html">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/184445277?v=4">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wejkey - Notes">
    <meta name="twitter:description" content="Website's notes">
    <meta name="twitter:image" content="https://avatars.githubusercontent.com/u/184445277?v=4">

    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/184445277?v=4">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style/notemd.css">
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <a class="brand" href="index.html"><span>Wejkey</span></a>
        <div class="links">
          <a class="btn" href="index.html">← Home</a>
          <a class="btn" href="notes/changelog.txt" target="_blank" rel="noopener noreferrer">Raw .txt</a>
        </div>
      </div>

      <section class="card">
        <div class="card-header">
          <div class="eyebrow">Notes</div>
          <h1>Changelog</h1>
        </div>

        <p id="status">Loading changelog…</p>
        <article id="markdown-content" class="markdown-body" hidden></article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function renderChangelog() {
        const status = document.getElementById('status');
        const output = document.getElementById('markdown-content');

        try {
          const response = await fetch('notes/changelog.txt', { cache: 'no-store' });

          if (!response.ok) {
            throw new Error(`Failed to load changelog (${response.status})`);
          }

          const markdown = await response.text();
          output.innerHTML = marked.parse(markdown, {
            mangle: false,
            headerIds: false
          });
          output.hidden = false;
          status.hidden = true;
        } catch (error) {
          status.textContent = 'Could not load the changelog right now. You can still open the raw .txt file with the button above.';
          console.error(error);
        }
      }

      renderChangelog();
    </script>
  </body>
</html>
